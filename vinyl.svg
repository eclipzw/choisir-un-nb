@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Quicksand:wght@300;400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Quicksand', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background: linear-gradient(-45deg, #ff00ff, #00ffff, #ff1493, #00f0ff, #ff69b4, #00e5ff);
  background-size: 400% 400%;
  animation: gradientShift 8s ease infinite;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
              radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
  animation: floatBg 20s ease-in-out infinite;
  z-index: -1;
}

@keyframes floatBg {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(20px, -20px); }
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  position: relative;
  z-index: 2;
}

.game {
  background: linear-gradient(135deg, rgba(255, 240, 250, 0.98), rgba(240, 248, 255, 0.98));
  border-radius: 30px;
  padding: 50px;
  width: 100%;
  max-width: 560px;
  box-shadow: 
    0 0 40px rgba(0, 255, 255, 0.3),
    0 0 80px rgba(255, 0, 255, 0.2),
    0 20px 60px rgba(100, 200, 255, 0.2);
  border: 3px solid;
  border-image: linear-gradient(135deg, #00ffff, #ff1493, #ff00ff, #00ffff) 1;
  backdrop-filter: blur(15px);
  position: relative;
  overflow: visible;
  animation: cardGlow 4s ease-in-out infinite;
}

@keyframes cardGlow {
  0%, 100% { box-shadow: 
    0 0 30px rgba(0, 255, 255, 0.25),
    0 0 60px rgba(255, 0, 255, 0.15),
    0 20px 60px rgba(100, 200, 255, 0.2); }
  50% { box-shadow: 
    0 0 50px rgba(0, 255, 255, 0.4),
    0 0 100px rgba(255, 0, 255, 0.25),
    0 25px 80px rgba(100, 200, 255, 0.25); }
}

h1 {
  text-align: center;
  margin-bottom: 40px;
  font-size: 36px;
  background: linear-gradient(135deg, #ff1493, #00ffff, #ff00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  letter-spacing: 3px;
  font-weight: 800;
  font-family: 'Baloo 2', 'Quicksand', cursive;
  text-transform: uppercase;
  animation: titlePulse 2s ease-in-out infinite;
}

@keyframes titlePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

/* cute musical note animation */
h1::after {
  content: ' ♪♫';
  display: inline-block;
  font-size: 24px;
  color: #00ffff;
  text-shadow: 0 0 12px rgba(0, 255, 255, 0.6);
  margin-left: 8px;
  animation: noteFloat 2s ease-in-out infinite;
}

@keyframes noteFloat {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-8px) rotate(10deg); }
}

.row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 10px 0;
  flex-wrap: wrap;
}

label {
  color: #555;
  font-weight: 700;
  min-width: 90px;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

select, input {
  padding: 14px 18px;
  border: 3px solid transparent;
  border-radius: 18px;
  outline: none;
  font-size: 16px;
  background: linear-gradient(white, white) padding-box, 
              linear-gradient(135deg, #00ffff, #ff1493, #ff00ff) border-box;
  transition: all 0.3s ease;
  font-weight: 500;
  color: #333;
  box-shadow: 0 6px 20px rgba(0, 255, 255, 0.15);
  font-family: 'Quicksand', sans-serif;
}

select:focus, input:focus {
  border-color: transparent;
  background: linear-gradient(white, white) padding-box, 
              linear-gradient(135deg, #ff1493, #ff00ff, #00ffff) border-box;
  box-shadow: 0 0 25px rgba(255, 20, 147, 0.4), 
              0 0 40px rgba(0, 255, 255, 0.3),
              inset 0 0 12px rgba(255, 20, 147, 0.08);
  transform: scale(1.03);
}

.row-reset {
  display: flex;
  justify-content: center;
  margin: 20px 0;
  gap: 15px;
}

button {
  padding: 15px 36px;
  border: none;
  border-radius: 18px;
  background: linear-gradient(135deg, #ff1493, #ff00ff, #00ffff);
  color: white;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 15px;
  box-shadow: 0 8px 30px rgba(255, 20, 147, 0.4), 
              0 0 20px rgba(0, 255, 255, 0.2);
  text-transform: uppercase;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
  font-family: 'Baloo 2', sans-serif;
}

button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.25);
  transition: left 0.3s ease;
}

button:hover::before {
  left: 100%;
}

button:hover {
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 12px 40px rgba(255, 20, 147, 0.6), 
              0 0 30px rgba(0, 255, 255, 0.35);
}

button:active {
  transform: translateY(-2px) scale(1.02);
}

#guessBtn {
  flex: 0 0 140px;
  min-width: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0.5px;
}

/* make the guess input wider while keeping responsiveness */
#guessInput {
  flex: 2;
  min-width: 240px;
}

#resetBtn {
  background: linear-gradient(135deg, #00ffff, #66ffff, #00e5ff);
  box-shadow: 0 8px 30px rgba(0, 255, 255, 0.4), 
              0 0 20px rgba(0, 255, 255, 0.25);
  min-width: 200px;
}

#resetBtn:hover {
  box-shadow: 0 12px 40px rgba(0, 255, 255, 0.6), 
              0 0 30px rgba(0, 255, 255, 0.35);
}

#attempts {
  text-align: center;
  margin: 8px 0 6px 0;
  font-size: 17px;
  color: #555;
  font-weight: 700;
  letter-spacing: 0.5px;
}

#attemptsLeft {
  color: #ff66cc;
  font-weight: 800;
  font-size: 22px;
  display: inline-block;
  min-width: 30px;
  text-align: center;
}

#feedback {
  text-align: center;
  margin: 16px 0;
  padding: 14px 18px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(255, 20, 147, 0.12), rgba(0, 255, 255, 0.12));
  color: #333;
  font-weight: 800;
  font-size: 17px;
  border: 2.5px solid rgba(0, 255, 255, 0.5);
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 15px rgba(0, 255, 255, 0.15);
}

.hotcold {
  text-align: center;
  font-size: 17px;
  margin: 8px 0;
  color: #00ffff;
  font-weight: 800;
  letter-spacing: 0.8px;
  animation: glow 2s ease-in-out infinite;
  text-transform: uppercase;
  text-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 10px rgba(0, 255, 255, 0.3), 0 0 20px rgba(255, 20, 147, 0.1); }
  50% { text-shadow: 0 0 20px rgba(0, 255, 255, 0.6), 0 0 30px rgba(255, 20, 147, 0.2); }
}

.history {
  margin-top: 20px;
  background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(255, 20, 147, 0.1));
  padding: 18px;
  border-radius: 18px;
  border: 2.5px solid rgba(0, 255, 255, 0.4);
  position: relative;
  box-shadow: 0 8px 25px rgba(0, 255, 255, 0.12);
}

.history h3 {
  margin-bottom: 15px;
  font-size: 18px;
  background: linear-gradient(135deg, #ff1493, #00ffff, #ff00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 800;
  font-family: 'Baloo 2', sans-serif;
}

#historyList {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

#historyList li {
  margin: 0;
  padding: 10px 15px;
  background: linear-gradient(135deg, rgba(0, 255, 255, 0.18), rgba(255, 20, 147, 0.12));
  border-radius: 12px;
  border: 2px solid rgba(0, 255, 255, 0.35);
  font-size: 15px;
  color: #333;
  font-weight: 700;
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px rgba(0, 255, 255, 0.12);
}

#historyList li:hover {
  transform: scale(1.1) rotate(-2deg);
  border-color: #ff1493;
  box-shadow: 0 6px 18px rgba(255, 20, 147, 0.35), 0 0 15px rgba(0, 255, 255, 0.25);
  background: linear-gradient(135deg, rgba(255, 20, 147, 0.2), rgba(0, 255, 255, 0.2));
}

/* Win/Lose states */
.feedback.win {
  background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(100, 255, 100, 0.15));
  color: #22c55e;
  border-color: #22c55e;
  animation: pulse-success 0.5s ease;
  text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
  box-shadow: 0 6px 20px rgba(34, 197, 94, 0.25);
}

.feedback.lose {
  background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(255, 100, 100, 0.15));
  color: #ff1493;
  border-color: #ff1493;
  animation: shake 0.5s ease;
  text-shadow: 0 0 10px rgba(255, 20, 147, 0.3);
  box-shadow: 0 6px 20px rgba(255, 20, 147, 0.25);
}

@keyframes pulse-success {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

/* Responsive */
@media (max-width: 600px) {
  .game {
    padding: 30px 20px;
    border-radius: 20px;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 25px;
  }

  button {
    padding: 12px 24px;
    font-size: 14px;
  }

  #guessBtn, #resetBtn {
    min-width: auto;
  }

  .row {
    flex-direction: column;
    align-items: stretch;
  }

  select, input {
    width: 100%;
    padding: 12px 15px;
  }

  label {
    min-width: auto;
    margin-bottom: 5px;
  }

  .row-reset {
    flex-direction: column;
  }

  #resetBtn {
    width: 100%;
  }

  #historyList {
    flex-direction: column;
  }

  #historyList li {
    width: 100%;
    text-align: center;
  }
}

/* ---------------- Miku-inspired decorations (ENHANCED) ---------------- */

/* soft pastel blob and animated ring */
.game::before {
  content: '';
  position: absolute;
  width: 200px;
  height: 200px;
  top: -60px;
  left: -60px;
  background: radial-gradient(circle at 35% 35%, rgba(0, 255, 255, 0.35), rgba(255, 20, 147, 0.15));
  filter: blur(30px);
  transform: rotate(12deg);
  z-index: -1;
  animation: blobFloat 6s ease-in-out infinite;
}

@keyframes blobFloat {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(15px, -15px) rotate(15deg); }
}

/* floating hearts around the game */
.game {
  --hearts: '❤️', '💜', '💙', '💚', '🩷';
}

/* animated sparkles and stars */
.history {
  position: relative;
}

.history::before, .history::after { display: none !important; }

@keyframes twinkle {
  0% { opacity: 0.1; transform: scale(0.5) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.3) rotate(180deg); }
  100% { opacity: 0.1; transform: scale(0.5) rotate(360deg); }
}

/* floating note near hot/cold with heart */
#hotCold::after { display: none !important; }

@keyframes floatNote {
  0%, 100% { transform: translateY(0) rotate(-8deg); opacity: 0.8; }
  50% { transform: translateY(-12px) rotate(8deg); opacity: 1; }
}

/* additional star float near title */
#attemptsLeft::after { display: none !important; }

@keyframes starTwinkle {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* ====== MUSICAL & MIKU ANIMATED ELEMENTS ====== */

/* Floating musical microphone - top left (removed for clarity) */
.container::before { display: none !important; }

/* Floating headphones - top right (removed) */
.game::before { display: none !important; }

/* ====== MIKU IMAGE ANIMATIONS - MULTIPLE POSITIONS ====== */

/* Miku character - BOTTOM LEFT CORNER (main dancing Miku) */
body::after {
  content: '';
  position: fixed;
  bottom: 2%;
  left: 1.5%;
  width: 100px;
  height: 100px;
  background: url('miku3\ \(1\).png') center/contain no-repeat;
  opacity: 0.9;
  animation: mikuFullExpression 12s ease-in-out infinite, mikuRainbowGlow 6s ease-in-out infinite;
  z-index: 1;
  filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.4)) drop-shadow(0 0 35px rgba(255, 20, 147, 0.25));
  transform-origin: center bottom;
}

/* Extra Miku TOP LEFT removed */

/* Extra Miku RIGHT SIDE removed */

/* Extra Miku BOTTOM RIGHT removed */

/* Extra Miku TOP RIGHT removed */

/* Extra Miku LEFT SIDE MID removed */

/* Extra Miku BOTTOM CENTER removed */

/* CENTER BACKGROUND Miku removed */

@keyframes floatMiku {
  0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
  25% { transform: translateY(-30px) scale(1.08) rotate(-8deg); }
  50% { transform: translateY(-50px) scale(1.15) rotate(8deg); }
  75% { transform: translateY(-20px) scale(1.05) rotate(-5deg); }
}

/* Floating hearts removed */

@keyframes floatHearts {
  0%, 100% { transform: translateY(-50%) translateX(0) rotate(0deg); }
  25% { transform: translateY(-80px) translateX(-10px) rotate(10deg); }
  50% { transform: translateY(-50%) translateX(15px) rotate(-10deg); }
  75% { transform: translateY(-20px) translateX(-8px) rotate(8deg); }
}

/* Bouncing musical notes removed */

@keyframes bounceNotes {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-15px) rotate(-8deg); }
  50% { transform: translateY(-30px) rotate(0deg); }
  75% { transform: translateY(-10px) rotate(8deg); }
}

/* Spinning star burst removed */

@keyframes spinStars {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.15); }
  100% { transform: rotate(360deg) scale(1); }
}

/* Love pulse removed */

@keyframes heartBeat {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25% { transform: scale(1.15) rotate(-5deg); }
  50% { transform: scale(1.25) rotate(5deg); }
  75% { transform: scale(1.1) rotate(-3deg); }
}

/* Miku's iconic color theme - glowing accents */
label::after { display: none !important; }

@keyframes micPulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* ====== EXPRESSIVE MIKU POSE ANIMATIONS ====== */

/* Miku dancing with arm movements */
@keyframes mikuDance {
  0% { 
    transform: translateY(0) scale(1) rotate(0deg);
  }
  20% { 
    /* Arms up - celebrating */
    transform: translateY(-15px) scale(1.05) rotate(-3deg);
  }
  40% { 
    /* Arm swing left */
    transform: translateY(-8px) scale(1.02) rotate(3deg);
  }
  60% { 
    /* Arm swing right */
    transform: translateY(-12px) scale(1.04) rotate(-2deg);
  }
  80% { 
    /* Peace sign pose */
    transform: translateY(-10px) scale(1.03) rotate(2deg);
  }
  100% { 
    transform: translateY(0) scale(1) rotate(0deg);
  }
}

/* Miku waving / arm raise animation */
@keyframes mikuWave {
  0%, 100% {
    transform: translateY(0) rotate(0deg);
  }
  25% {
    /* Right arm up */
    transform: translateY(-20px) rotate(8deg);
  }
  50% {
    /* Both arms raised */
    transform: translateY(-30px) rotate(0deg);
  }
  75% {
    /* Left arm up */
    transform: translateY(-20px) rotate(-8deg);
  }
}

/* Miku heart hand gesture */
@keyframes mikuHeartHands {
  0%, 100% {
    transform: translateY(0) scale(1);
  }
  50% {
    /* Hands forming heart */
    transform: translateY(-25px) scale(1.1);
  }
}

/* Miku spinning dance move */
@keyframes mikuSpin {
  0% {
    transform: translateY(0) rotateZ(0deg) scale(1);
  }
  50% {
    transform: translateY(-25px) rotateZ(180deg) scale(1.08);
  }
  100% {
    transform: translateY(0) rotateZ(360deg) scale(1);
  }
}

/* Miku peace sign pose with tilt */
@keyframes mikuPeace {
  0%, 100% {
    transform: translateY(0) rotate(0deg) scaleX(1);
  }
  25% {
    transform: translateY(-18px) rotate(-8deg) scaleX(1.02);
  }
  50% {
    transform: translateY(-30px) rotate(0deg) scaleX(1.05);
  }
  75% {
    transform: translateY(-15px) rotate(8deg) scaleX(1.02);
  }
}

/* Miku happy bounce */
@keyframes mikuBounce {
  0%, 100% {
    transform: translateY(0) scale(1);
  }
  25% {
    transform: translateY(-20px) scale(1.05);
  }
  50% {
    transform: translateY(-35px) scale(1.08);
  }
  75% {
    transform: translateY(-15px) scale(1.03);
  }
}

/* Miku excited jump */
@keyframes mikuJump {
  0%, 100% {
    transform: translateY(0) rotateZ(0deg);
  }
  25% {
    transform: translateY(-40px) rotateZ(-15deg) scale(1.1);
  }
  50% {
    transform: translateY(-50px) rotateZ(15deg) scale(1.12);
  }
  75% {
    transform: translateY(-25px) rotateZ(-8deg) scale(1.05);
  }
}

/* Miku playful tilt */
@keyframes mikuPlayful {
  0%, 100% {
    transform: translateY(0) rotate(0deg) scaleY(1);
  }
  25% {
    transform: translateY(-12px) rotate(5deg) scaleY(1.02);
  }
  50% {
    transform: translateY(-20px) rotate(-5deg) scaleY(1.04);
  }
  75% {
    transform: translateY(-8px) rotate(3deg) scaleY(1.02);
  }
}

/* Miku victory pose */
@keyframes mikuVictory {
  0%, 100% {
    transform: translateY(0) scale(1) rotate(0deg);
  }
  20% {
    transform: translateY(-35px) scale(1.08) rotate(5deg);
  }
  40% {
    transform: translateY(-45px) scale(1.12) rotate(-5deg);
  }
  60% {
    transform: translateY(-30px) scale(1.1) rotate(3deg);
  }
  80% {
    transform: translateY(-25px) scale(1.06) rotate(-2deg);
  }
}

/* Heart particles floating from Miku */
@keyframes heartEmit {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(1);
  }
  50% {
    opacity: 0.8;
  }
  100% {
    opacity: 0;
    transform: translate(var(--tx), var(--ty)) scale(0.5);
  }
}

/* Miku with multiple animation poses - apply to miku.png */
/* (Already defined above with multiple Miku instances) */

/* Additional Miku animation variants on hover/dynamic elements */
@keyframes mikuFullExpression {
  0% {
    transform: translateY(0) scale(1) rotate(0deg) skewX(0deg);
  }
  12% {
    /* Excited arm raise */
    transform: translateY(-35px) scale(1.1) rotate(8deg) skewX(2deg);
  }
  25% {
    /* Both arms up celebration */
    transform: translateY(-45px) scale(1.15) rotate(-8deg) skewX(-2deg);
  }
  37% {
    /* Tilt left */
    transform: translateY(-25px) scale(1.08) rotate(-12deg) skewX(0deg);
  }
  50% {
    /* Center - peace sign */
    transform: translateY(-30px) scale(1.12) rotate(0deg) skewX(0deg);
  }
  62% {
    /* Tilt right */
    transform: translateY(-20px) scale(1.08) rotate(12deg) skewX(0deg);
  }
  75% {
    /* Heart hands */
    transform: translateY(-35px) scale(1.1) rotate(5deg) skewX(-2deg);
  }
  87% {
    /* Spin moment */
    transform: translateY(-40px) scale(1.12) rotate(-8deg) skewX(2deg);
  }
  100% {
    transform: translateY(0) scale(1) rotate(0deg) skewX(0deg);
  }
}

/* Heart burst around game on win */
@keyframes heartBurst {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(1) rotate(0deg);
  }
  100% {
    opacity: 0;
    transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg);
  }
}

/* Gentle floating hearts animation */
@keyframes floatingHearts {
  0%, 100% {
    transform: translateY(0) rotateZ(0deg);
    opacity: 0.8;
  }
  25% {
    transform: translateY(-15px) rotateZ(-8deg);
    opacity: 1;
  }
  50% {
    transform: translateY(-30px) rotateZ(8deg);
    opacity: 0.9;
  }
  75% {
    transform: translateY(-15px) rotateZ(-4deg);
    opacity: 1;
  }
}

/* Confetti-like particles falling */
@keyframes confettiPop {
  0% {
    opacity: 1;
    transform: translateY(0) rotate(0deg) scale(1);
  }
  100% {
    opacity: 0;
    transform: translateY(50px) rotate(360deg) scale(0);
  }
}

/* Rainbow glow pulse for celebration */
@keyframes rainbowGlow {
  0% {
    filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.4));
  }
  25% {
    filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.6));
  }
  50% {
    filter: drop-shadow(0 0 30px rgba(255, 20, 147, 0.5));
  }
  75% {
    filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5));
  }
  100% {
    filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.4));
  }
}

/* Enhanced Miku glow with rainbow colors */
@keyframes mikuRainbowGlow {
  0%, 100% {
    filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.5)) drop-shadow(0 0 25px rgba(255, 20, 147, 0.3));
  }
  25% {
    filter: drop-shadow(0 0 25px rgba(0, 255, 255, 0.7)) drop-shadow(0 0 40px rgba(255, 20, 147, 0.4));
  }
  50% {
    filter: drop-shadow(0 0 35px rgba(0, 255, 255, 0.8)) drop-shadow(0 0 50px rgba(255, 0, 255, 0.5));
  }
  75% {
    filter: drop-shadow(0 0 25px rgba(0, 255, 255, 0.7)) drop-shadow(0 0 40px rgba(255, 20, 147, 0.4));
  }
}

/* All Miku animations are applied above in the fixed positioning section */
